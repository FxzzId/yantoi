<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Akses Ditolak | Yanto Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%); font-family: 'Inter', sans-serif; min-height:100vh; display:flex; justify-content:center; align-items:center; padding:20px; }
        .card { background:rgba(255,255,255,0.06); backdrop-filter:blur(12px); border-radius:32px; padding:40px; max-width:450px; width:100%; border:1px solid rgba(255,255,255,0.08); text-align:center; }
        .icon { font-size:4rem; color:#ef4444; margin-bottom:16px; }
        h1 { color:#ef4444; font-size:1.5rem; font-weight:700; margin-bottom:8px; }
        p { color:#94a3b8; font-size:0.85rem; margin-bottom:20px; line-height:1.6; }
        .btn-back { background:#334155; border:none; padding:12px 24px; border-radius:40px; color:white; font-weight:500; cursor:pointer; display:inline-flex; align-items:center; gap:8px; text-decoration:none; transition:0.2s; }
        .btn-back:hover { background:#475569; }
    </style>
</head>
<body>
<div class="card">
    <div class="icon"><i class="fas fa-ban"></i></div>
    <h1>Akses Ditolak</h1>
    <p>Maaf, kamu tidak memiliki izin untuk mengakses halaman ini.<br>Halaman ini hanya untuk admin yang terdaftar.</p>
    <a href="/" class="btn-back"><i class="fas fa-home"></i> Kembali ke Beranda</a>
</div>
</body>
</html>
