<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Panel - Nisa Imut</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:Arial,sans-serif; }
        body { background:#f0f2f5; padding:20px; }
        .admin-container { max-width:1000px; margin:0 auto; }
        .header { background:white; padding:20px 30px; border-radius:12px; box-shadow:0 2px 8px rgba(0,0,0,0.08); margin-bottom:20px; display:flex; justify-content:space-between; align-items:center; }
        .header h1 { color:#1a1a2e; font-size:24px; }
        .header h1 span { color:#e74c3c; }
        .header a { color:#6c5ce7; text-decoration:none; font-weight:600; }
        .header a:hover { text-decoration:underline; }
        .stats { display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:15px; margin-bottom:20px; }
        .stat-card { background:white; padding:20px; border-radius:12px; box-shadow:0 2px 8px rgba(0,0,0,0.08); text-align:center; }
        .stat-card h3 { font-size:13px; color:#888; text-transform:uppercase; letter-spacing:1px; }
        .stat-card .number { font-size:32px; font-weight:bold; color:#1a1a2e; margin-top:5px; }
        .stat-card .number.green { color:#27ae60; }
        .stat-card .number.orange { color:#f39c12; }
        .stat-card .number.red { color:#e74c3c; }
        .card { background:white; border-radius:12px; box-shadow:0 2px 8px rgba(0,0,0,0.08); padding:20px; margin-bottom:20px; }
        .card h2 { font-size:18px; margin-bottom:15px; color:#1a1a2e; }
        table { width:100%; border-collapse:collapse; font-size:14px; }
        th { text-align:left; padding:10px 8px; background:#f8f9fa; border-bottom:2px solid #ddd; color:#555; }
        td { padding:10px 8px; border-bottom:1px solid #eee; }
        .status-badge { display:inline-block; padding:4px 12px; border-radius:20px; font-size:12px; font-weight:600; }
        .status-pending { background:#fff3cd; color:#856404; }
        .status-paid { background:#d4edda; color:#155724; }
        .status-expired { background:#f8d7da; color:#721c24; }
        .filter-bar { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:15px; }
        .filter-bar select, .filter-bar input { padding:8px 12px; border-radius:6px; border:1px solid #ddd; font-size:13px; }
        .filter-bar button { padding:8px 20px; background:#6c5ce7; color:white; border:none; border-radius:6px; cursor:pointer; font-weight:600; }
        .filter-bar button:hover { background:#5a4bd1; }
        .empty-state { text-align:center; padding:40px 0; color:#999; }
        .refresh-btn { background:#3498db; color:white; border:none; padding:8px 16px; border-radius:6px; cursor:pointer; font-weight:600; }
        .refresh-btn:hover { background:#2980b9; }
        .toast { position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:#333; color:white; padding:12px 24px; border-radius:8px; display:none; z-index:999; }
    </style>
</head>
<body>
    <div class="admin-container">
        <div class="header">
            <h1>👑 Admin <span>Nisa Imut</span></h1>
            <div>
                <button class="refresh-btn" onclick="loadData()">🔄 Refresh</button>
                <a href="/" style="margin-left:15px;">← Kembali</a>
            </div>
        </div>

        <div class="stats" id="statsContainer">
            <div class="stat-card"><h3>Total Transaksi</h3><div class="number" id="totalCount">0</div></div>
            <div class="stat-card"><h3>Pending</h3><div class="number orange" id="pendingCount">0</div></div>
            <div class="stat-card"><h3>Paid</h3><div class="number green" id="paidCount">0</div></div>
            <div class="stat-card"><h3>Expired</h3><div class="number red" id="expiredCount">0</div></div>
        </div>

        <div class="card">
            <h2>📋 Daftar Transaksi</h2>
            <div class="filter-bar">
                <select id="filterStatus">
                    <option value="all">Semua Status</option>
                    <option value="pending">Pending</option>
                    <option value="paid">Paid</option>
                    <option value="expired">Expired</option>
                </select>
                <input type="date" id="filterStart" />
                <input type="date" id="filterEnd" />
                <button onclick="loadData()">Filter</button>
            </div>
            <div id="tableContainer">
                <div class="empty-state">Loading...</div>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        // ========== KONFIGURASI ==========
        const API_URL = 'https://api.qrispy.id';
        const API_TOKEN = 'cki_WiQReCOCDBdovv6s59mtzguPRvlQYdgcE4A8hnbJx67REy3Y'; // GANTI PAKE TOKEN BARU!

        let allTransactions = [];

        function showToast(msg, isError = false) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.style.background = isError ? '#e74c3c' : '#333';
            t.style.display = 'block';
            clearTimeout(t._timer);
            t._timer = setTimeout(() => { t.style.display = 'none'; }, 3000);
        }

        function getStatusBadge(status) {
            const map = {
                'pending': 'status-pending',
                'paid': 'status-paid',
                'expired': 'status-expired'
            };
            return `<span class="status-badge ${map[status] || ''}">${status.toUpperCase()}</span>`;
        }

        function formatDate(dateStr) {
            if (!dateStr) return '-';
            const d = new Date(dateStr);
            return d.toLocaleString('id-ID', { day:'2-digit', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit' });
        }

        function formatRupiah(amount) {
            return 'Rp ' + Number(amount).toLocaleString('id-ID');
        }

        async function loadData() {
            const status = document.getElementById('filterStatus').value;
            const start = document.getElementById('filterStart').value;
            const end = document.getElementById('filterEnd').value;

            let url = API_URL + '/api/payment/transactions?limit=100';
            if (status !== 'all') url += '&status=' + status;
            if (start) url += '&start_date=' + start;
            if (end) url += '&end_date=' + end;

            try {
                const res = await fetch(url, {
                    headers: { 'X-API-Token': API_TOKEN }
                });
                const data = await res.json();

                if (data.status === 'success') {
                    allTransactions = data.data || [];
                    renderTable(allTransactions);
                    updateStats(allTransactions);
                } else {
                    showToast('Gagal load data: ' + JSON.stringify(data), true);
                }
            } catch (err) {
                showToast('Error: ' + err.message, true);
            }
        }

        function renderTable(transactions) {
            const container = document.getElementById('tableContainer');

            if (!transactions || transactions.length === 0) {
                container.innerHTML = '<div class="empty-state">📭 Belum ada transaksi</div>';
                return;
            }

            let html = `
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Jumlah</th>
                            <th>Status</th>
                            <th>Referensi</th>
                            <th>Dibuat</th>
                            <th>Kadaluarsa</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            transactions.forEach(t => {
                html += `
                    <tr>
                        <td><code style="font-size:12px;">${t.qris_id || '-'}</code></td>
                        <td>${formatRupiah(t.amount)}</td>
                        <td>${getStatusBadge(t.status)}</td>
                        <td>${t.payment_reference || '-'}</td>
                        <td>${formatDate(t.created_at)}</td>
                        <td>${formatDate(t.expired_at)}</td>
                    </tr>
                `;
            });

            html += '</tbody></table>';
            container.innerHTML = html;
        }

        function updateStats(transactions) {
            const total = transactions.length;
            const pending = transactions.filter(t => t.status === 'pending').length;
            const paid = transactions.filter(t => t.status === 'paid').length;
            const expired = transactions.filter(t => t.status === 'expired').length;

            document.getElementById('totalCount').textContent = total;
            document.getElementById('pendingCount').textContent = pending;
            document.getElementById('paidCount').textContent = paid;
            document.getElementById('expiredCount').textContent = expired;
        }

        // ========== AUTO LOAD ==========
        document.addEventListener('DOMContentLoaded', loadData);

        // Enter key di filter
        document.querySelectorAll('.filter-bar input').forEach(inp => {
            inp.addEventListener('keyup', (e) => { if (e.key === 'Enter') loadData(); });
        });
    </script>
</body>
</html>
